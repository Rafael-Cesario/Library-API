services:
        postgres:
                image: postgres:16-alpine
                container_name: postgres_dev
                restart: unless-stopped
                environment:
                        POSTGRES_USER: admin
                        POSTGRES_PASSWORD: admin
                        POSTGRES_DB: library_dev
                ports:
                        - "5432:5432"
                volumes:
                        - ./postgres_data:/var/lib/postgresql/data

        postgres_test:
                image: postgres:16-alpine
                container_name: postgres_test
                restart: unless-stopped
                environment:
                        POSTGRES_USER: admin
                        POSTGRES_PASSWORD: admin
                        POSTGRES_DB:
                ports:
                        - "5433:5432"
